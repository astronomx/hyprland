# BACKGROUND
background {
    monitor = 
    path = ~/Pictures/wallpapers/purple-forest.jpeg
    blur_passes = 3
    blur_size = 8
    contrast = 1.0
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    grace = 0
    hide_cursor = true
    ignore_empty_input = true
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(255, 255, 255, 0.9)
    font_size = 120
    font_family = SF Pro Display Light
    position = 0, 160
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%A, %d %B")</span>"
    color = rgba(255, 255, 255, 0.6)
    font_size = 24
    font_family = SF Pro Display
    position = 0, 60
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = 
    hide_input = false
    rounding = 12
    check_color = rgba(204, 136, 255, 0.3)
    fail_color = rgba(255, 50, 50, 0.3)
    fail_text = 
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    position = 0, -60
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =   $USER
    color = rgba(255, 255, 255, 0.5)
    font_size = 14
    font_family = SF Pro Display
    position = 0, -130
    halign = center
    valign = center
}

# POWER BUTTON
label {
    monitor =
    text = ⏻
    color = rgba(255, 255, 255, 0.4)
    font_size = 28
    font_family = SF Pro Display
    position = 30, 30
    halign = right
    valign = bottom
}

# Shutdown hint
label {
    monitor =
    text = shutdown
    color = rgba(255, 255, 255, 0.3)
    font_size = 10
    font_family = SF Pro Display
    position = 30, 12
    halign = right
    valign = bottom
}
