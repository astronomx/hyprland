# ================================
#  Cyberpunk Edgerunners Hyprpaper
# ================================

# BACKGROUND
background {
    monitor =
    path = ~/Pictures/wallpapers/LucyAndDavidMoonLock.jpg

    blur_passes = 0

    contrast = 1.1
    brightness = 0.75

    vibrancy = 0.35
    vibrancy_darkness = 0.4
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# =========================
# TIME (NEON CYAN)
# =========================
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"

    color = rgba(0, 247, 255, 0.9)
    font_size = 160
    font_family = Share Tech Mono

    position = 0, 370
    halign = center
    valign = center
}

# DATE (MAGENTA ACCENT)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"

    color = rgba(255, 46, 136, 0.8)
    font_size = 28
    font_family = Share Tech Mono

    position = 0, 490
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =   $USER

    color = rgba(203, 213, 255, 0.75)

    font_size = 18
    font_family = ProggyClean Nerd Font Mono

    position = 0, -180
    halign = center
    valign = center
}

# =========================
# INPUT FIELD (TERMINAL STYLE)
# =========================
input-field {
    monitor =
    size = 320, 60

    outline_thickness = 2

    # neon border
    outer_color = rgba(0, 247, 255, 0.7)

    # dark glass background
    inner_color = rgba(10, 10, 15, 0.7)

    font_color = rgba(255, 255, 255, 0.95)

    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = true

    fade_on_empty = false
    hide_input = false

    font_family = ProggyClean Nerd Font Mono

    # 🔥 FIXED placeholder (cyberpunk style)
    placeholder_text = //:AUTHENTICATE

    # feedback colors
    check_color = rgba(0, 255, 156, 0.6)   # neon green
    fail_color = rgba(255, 46, 136, 0.6)   # neon pink

    rounding = 10

    position = 0, -250
    halign = center
    valign = center
}