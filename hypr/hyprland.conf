
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto
monitor = eDP-1,1920x1080,0x0,1
monitor = DP-1,1920x515,0x1080,1
# Use monitor description instead of port name for Thunderbolt monitor
# This approach uses the monitor's exact description including model and serial
# Alternative: use just the model name: monitor = desc:PL2470H,1920x1080@120,1920x0,1
monitor = desc:Iiyama North America PL2470H 0x00000AD3,1920x1080@120,1920x0,1
monitor = HDMI-A-1,1920x1080,auto,auto


workspace=0,monitor:HDMI-A-1

workspace=1,monitor:eDP-1
workspace=2,monitor:eDP-1
workspace=3,monitor:eDP-1

workspace=4,monitor:DP-1
workspace=5,monitor:DP-1
workspace=6,monitor:DP-1

workspace=7,monitor:desc:Iiyama North America PL2470H 0x00000AD3
workspace=8,monitor:desc:Iiyama North America PL2470H 0x00000AD3
workspace=9,monitor:desc:Iiyama North America PL2470H 0x00000AD3

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = vicinae toggle
$browser = zen-browser
$code = code

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = waybar & hyprpaper
# Ensure we start on workspace 1 instead of workspace 0
exec-once = hyprctl dispatch workspace 1
exec-once = vicinae server
# EWW widgets for DP-1 monitor
exec-once = eww daemon && eww open bar-dp1
# Use default docker context
exec-once = docker context use default
## Load all plugins at start
exec-once = hyprpm reload

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
###    PLUGINS    ###
#####################

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1

        gesture_distance = 300 # how far is the "max" for the gesture
    }
}

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 6
    gaps_out = 22

    border_size = 2

    # Neon cyan active, subtle inactive
    col.active_border = rgba(00f7ffee)
    col.inactive_border = rgba(2a2a3aaa)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 3

    active_opacity = 1
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 20
        render_power = 4
        color = rgba(000000aa)
    }

    blur {
        enabled = true
        size = 8
        passes = 3

        # gives that "neon glow through glass" effect
        vibrancy = 0.25
        vibrancy_darkness = 0.6
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes

    # CUSTOM CURVES
    bezier = cyberOut, 0.16, 1, 0.3, 1
    bezier = cyberIn, 0.7, 0, 0.84, 0
    bezier = cyberSmooth, 0.25, 0.1, 0.25, 1
    bezier = cyberBounce, 0.34, 1.56, 0.64, 1

    # GLOBAL
    animation = global, 1, 8, cyberSmooth

    # =========================
    # WINDOWS (OPEN / CLOSE)
    # =========================
    animation = windowsIn, 1, 5, cyberOut, popin 85%
    animation = windowsOut, 1, 4, cyberIn, popin 85%
    animation = windowsMove, 1, 4, cyberSmooth

    # =========================
    # FADE
    # =========================
    animation = fadeIn, 1, 3, cyberOut
    animation = fadeOut, 1, 2, cyberIn
    animation = fadeSwitch, 1, 2, cyberSmooth

    # =========================
    # WORKSPACES (KEY FEATURE)
    # =========================
    animation = workspaces, 1, 6, cyberSmooth, slidefade 20%
    animation = workspacesIn, 1, 5, cyberOut, slidefade 20%
    animation = workspacesOut, 1, 5, cyberIn, slidefade 20%

    # =========================
    # LAYERS (waybar, dunst etc.)
    # =========================
    animation = layersIn, 1, 4, cyberOut, slide
    animation = layersOut, 1, 3, cyberIn, slide

    # =========================
    # BORDER
    # =========================
    animation = border, 1, 3, cyberSmooth

    # OPTIONAL
    # animation = borderangle, 1, 8, cyberSmooth, loop
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hypr.land/Configuring/Variables/#gestures
gestures {
    # workspace_swipe = false
}

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, killactive
bind = SUPER_SHIFT, Q, forcekillactive,
bind = $mainMod, L, exec, bash -c "hyprlock"
bind = SUPER_SHIFT, L, exit,
bind = $mainMod, P, togglefloating,
bind = SUPER, TAB, hyprexpo:expo, toggle  

# Vicinae (App launcher)
bind = $mainMod, R, exec, $menu
bind = $mainMod, V, exec, vicinae vicinae://extensions/vicinae/clipboard/history

# Apps
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, exec, $code
bind = SUPER_SHIFT, C, exec, cursor

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, l
bind = $mainMod, down, movefocus, r

# Cycle through windows with k and j (vim-style)
bind = $mainMod, K, cyclenext, prev
bind = $mainMod, J, cyclenext

bind = $mainMod, O, focusmonitor, eDP-1
bind = SUPER_SHIFT, O, focusmonitor, DP-1
bind = $mainMod, M, fullscreenstate, 1
bind = $mainMod, F, fullscreenstate, 2

# Screenshots
bind = , PRINT, exec, hyprshot -m ouput
bind = $mainMod Control, P, exec, hyprshot -m region --freeze 
bind = SUPER_SHIFT, P, exec, hyprshot -m region --freeze --clipboard-only

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 0, workspace, 0

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3

bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 0, movetoworkspace, 0

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3

bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6

bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, sh -c "wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+ && dunstify -a volume -h int:value:\$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{v=int(\$2*100); if (v>100) v=100; print v}') 'VOLUME'"
bindel = ,XF86AudioLowerVolume, exec, sh -c "wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && dunstify -a volume -h int:value:\$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int(\$2*100)}') 'VOLUME'"
bindel = ,XF86AudioMute, exec, sh -c "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && if wpctl get-volume @DEFAULT_AUDIO_SINK@ | rg -q MUTED; then dunstify -a volume-mute 'AUDIO' 'Muted'; else dunstify -a volume-mute 'AUDIO' 'Unmuted'; fi"
bindel = ,XF86MonBrightnessUp, exec, sh -c "brightnessctl -e4 -n2 -d intel_backlight set 5%+ && brightnessctl -e4 -n2 -d asus_screenpad set 5%+ && cur=\$(brightnessctl -d intel_backlight g) && max=\$(brightnessctl -d intel_backlight m) && dunstify -a brightness -h int:value:\$((cur*100/max)) 'BRIGHTNESS'"
bindel = ,XF86MonBrightnessDown, exec, sh -c "brightnessctl -e4 -n2 -d intel_backlight set 5%- && brightnessctl -e4 -n2 -d asus_screenpad set 5%- && cur=\$(brightnessctl -d intel_backlight g) && max=\$(brightnessctl -d intel_backlight m) && dunstify -a brightness -h int:value:\$((cur*100/max)) 'BRIGHTNESS'"

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = windowrule-1
  suppress_event = maximize
  match:class = .*
}


# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-2
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


# blur
layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0
  no_anim = on
  match:namespace = vicinae
}
