# ================================
#  Cyberpunk Edgerunners Kitty
# ================================

# ----- Appearance -----

background_opacity 0.80
background_blur 25

font_family        ProggyClean CE Nerd Font Mono
bold_font          auto
italic_font        auto
font_size          18

cursor_shape       block
cursor_blink       true
cursor #00f7ff

window_border_width 0
window_padding_width 10

# ----- Colors (Cyberpunk Neon) -----

foreground #e0e0ff
background #0a0a0f

selection_foreground #0a0a0f
selection_background #00f7ff

# Black / dark tones
color0  #0a0a0f
color8  #1f2335

# Neon accents
color1  #ff2e88
color2  #00ff9c
color3  #ffd300
color4  #00f7ff
color5  #ff2e88
color6  #00f7ff
color7  #cbd5ff

# Bright variants
color9  #ff5ea8
color10 #5affc8
color11 #ffe866
color12 #5befff
color13 #ff6aa8
color14 #5befff
color15 #ffffff

# ----- Cursor trail / glow feel -----
cursor_trail 1
cursor_trail_decay 0 0.1

# ----- Behavior -----
enable_audio_bell no
allow_remote_control yes
remember_window_size no
initial_window_width  120c
initial_window_height 36c
shell_integration enabled
