# ================================
#  Modern Kitty Configuration
# ================================

# ----- Appearance -----

# Semi-transparent background
background_opacity 0.85

# Request background blur from compositor (Wayland/macOS only)
background_blur 20

# Smooth font rendering
font_family        ProggyClean CE Nerd Font Mono
bold_font          auto
italic_font        auto
font_size          18

# Cursor
cursor_shape       beam
cursor_blink       true

# Disable window borders
window_border_width 0

# Minimal padding
window_padding_width 8

# ----- Colors (Tokyo Night inspired) -----
foreground #c0caf5
background #1a1b26

color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# ----- Behavior -----
enable_audio_bell no
allow_remote_control yes
remember_window_size no
initial_window_width  120c
initial_window_height 36c

