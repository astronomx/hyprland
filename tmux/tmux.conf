# ================================
#  Cyberpunk Edgerunners Tmux
# ================================

# To set path to tmux.conf file use: tmux -f path/to/file.conf (~/.conf/tmux/tmux.conf)
# To reload tmux use: tmux source-file ~/.config/tmux/tmux.conf

# ----- Terminal / colors -----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",tmux-256color:RGB"
set -as terminal-overrides ",xterm-256color:RGB"

# ----- Behavior -----
set -g mouse on
set -g focus-events on
set -g escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
setw -g automatic-rename on
setw -g renumber-windows on

# ----- Panes -----
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g pane-border-lines heavy
set -g pane-border-style "fg=#2a2a3a"
set -g pane-active-border-style "fg=#00f7ff"

# ----- Status bar -----
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify centre

set -g status-style "bg=#0a0a0f,fg=#e0e0ff"

set -g status-left-length 28
set -g status-left "#[fg=#00f7ff,bold]TMUX://#[fg=#e0e0ff] #{session_name} "

set -g status-right-length 48
set -g status-right "#[fg=#1f2335]▓#[fg=#00ff9c] %H #[fg=#ffd300]%I:%M %p #[fg=#5befff]%d-%b-%y"

setw -g window-status-style "fg=#5befff,bg=#0a0a0f"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#0a0a0f,bg=#00f7ff,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-activity-style "fg=#ffd300,bg=#0a0a0f,bold"
setw -g window-status-bell-style "fg=#ff2e88,bg=#14000a,bold"

# ----- Messages / prompts -----
set -g message-style "bg=#1f2335,fg=#00f7ff"
set -g message-command-style "bg=#1f2335,fg=#ffd300"
setw -g mode-style "bg=#00f7ff,fg=#0a0a0f,bold"

# ----- Copy mode -----
setw -g copy-mode-match-style "fg=#ffd300,bg=#1f2335"
setw -g copy-mode-current-match-style "fg=#0a0a0f,bg=#00ff9c,bold"

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel

# ----- Popups / menus -----
set -g popup-border-style "fg=#00f7ff"
set -g popup-border-lines heavy
set -g menu-border-style "fg=#00f7ff"
set -g menu-border-lines heavy
set -g menu-selected-style "bg=#00f7ff,fg=#0a0a0f,bold"
